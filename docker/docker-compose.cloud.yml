# ⚠️ DEPRECATED: Use docker/docker-compose.yml with --profile cloud instead
# This file is kept for backwards compatibility only.
# Recommended: docker compose -f docker/docker-compose.yml --profile cloud up -d
# Or use: bash scripts/bootstrap.sh cloud

# ACORN Cloud GPU profile (vLLM backend)
version: "3.9"

include:
  - docker/docker-compose.base.yml

services:
  acorn-vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:8000"  # expose on Ollama-compatible port
    command: ["--model", "Qwen/Qwen2.5-Coder-32B-Instruct", "--served-model-name", "qwen3-coder"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  acorn-api-relay:
    environment:
      OLLAMA_BASE_URL: http://acorn-vllm:8000
      REDIS_URL: redis://acorn-redis:6379
      ROUTING_STRATEGY: passthrough

  acorn-api:
    environment:
      ACORN_MODE: cloud
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
      DEFAULT_MODEL: Qwen/Qwen2.5-Coder-32B-Instruct
      CODER_MODEL: Qwen/Qwen2.5-Coder-32B-Instruct
      ANALYSIS_MODEL: Qwen/Qwen2.5-Coder-32B-Instruct
      MAX_AGENTS_PER_PROBLEM: "5"
      MAX_CONCURRENT_PROBLEMS: "3"
      MAX_HARNESS_CONTAINERS: "15"
      CONCURRENT_PROBLEMS_ENABLED: "true"

volumes: {}
