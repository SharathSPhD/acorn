# ACORN Pre-built Compose — uses published GHCR images, no local builds
# Usage: docker compose -f docker/docker-compose.prebuilt.yml --profile dgx up
services:
  acorn-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks: [acorn-net]
    environment:
      POSTGRES_USER: acorn
      POSTGRES_PASSWORD: acorn
      POSTGRES_DB: acorn
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acorn"]
      interval: 10s
      timeout: 5s
      retries: 5

  acorn-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [acorn-net]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  acorn-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["dgx"]

  acorn-api:
    image: ghcr.io/sharathsphd/acorn-api:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
    depends_on:
      acorn-postgres:
        condition: service_healthy
      acorn-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: ["dgx", "mini", "cloud"]

  acorn-api-relay:
    image: ghcr.io/sharathsphd/acorn-relay:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "9000:9000"
    environment:
      REDIS_URL: redis://acorn-redis:6379
      OLLAMA_BASE_URL: http://acorn-ollama:11434
      OLLAMA_DEFAULT_MODEL: qwen3-coder
      ROUTING_STRATEGY: passthrough
    depends_on:
      - acorn-redis
    profiles: ["dgx", "mini", "cloud"]

  acorn-ui:
    image: ghcr.io/sharathsphd/acorn-ui:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8501:8501"
    environment:
      API_BACKEND_URL: http://acorn-api:8000
    depends_on:
      - acorn-api
    profiles: ["dgx", "mini", "cloud"]

  acorn-harness:
    image: ghcr.io/sharathsphd/acorn-harness:latest
    restart: "no"
    networks: [acorn-net]
    environment:
      ANTHROPIC_BASE_URL: http://acorn-api-relay:9000
      ANTHROPIC_AUTH_TOKEN: ollama
      ANTHROPIC_API_KEY: "ollama"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    profiles: ["dgx", "mini", "cloud"]

networks:
  acorn-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  ollama-models:
