# This file is kept for backwards compatibility only.
# Recommended: docker compose -f docker/docker-compose.yml --profile dgx up -d
# Or use: bash scripts/bootstrap.sh dgx

# ACORN DGX Spark profile
version: "3.9"

include:
  - docker/docker-compose.base.yml

services:
  acorn-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  acorn-ui:
    image: acorn/ui:latest
    build:
      context: ./ui-next
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8501:8501"
    environment:
      API_BACKEND_URL: http://acorn-api:8000
    depends_on:
      - acorn-api

volumes:
  ollama-models:
