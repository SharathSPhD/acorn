# ⚠️ DEPRECATED: This file is now included by the old profile files for backwards compatibility.
# Use the unified docker/docker-compose.yml with --profile dgx|mini|cloud instead.
#
# ACORN Base Docker Compose — shared service definitions
# Do not use directly. Use docker-compose.{dgx,mini,cloud}.yml (or the new unified file).
version: "3.9"

x-acorn-harness: &acorn-harness-defaults
  image: acorn/harness:latest
  restart: "no"
  networks: [acorn-net]
  environment:
    ANTHROPIC_BASE_URL: http://acorn-api-relay:9000
    ANTHROPIC_AUTH_TOKEN: ollama
    ANTHROPIC_API_KEY: ""
    CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    REDIS_URL: redis://acorn-redis:6379
    DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
  volumes:
    - acorn-data:/mnt/acorn-data:ro
    - acorn-kernels:/mnt/acorn-kernels:ro
    - ./scripts/deny-patterns.txt:/workspace/scripts/deny-patterns.txt:ro
  depends_on:
    - acorn-api-relay
    - acorn-redis
    - acorn-postgres

services:
  acorn-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks: [acorn-net]
    environment:
      POSTGRES_USER: acorn
      POSTGRES_PASSWORD: acorn
      POSTGRES_DB: acorn
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acorn"]
      interval: 10s
      timeout: 5s
      retries: 5

  acorn-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [acorn-net]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  acorn-api:
    image: acorn/api:latest
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
      META_AGENT_ENABLED: ${META_AGENT_ENABLED:-false}
    depends_on:
      acorn-postgres:
        condition: service_healthy
      acorn-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  acorn-api-relay:
    image: acorn/api-relay:latest
    build:
      context: ../acorn_mcp/acorn-api-relay
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "9000:9000"
    environment:
      OLLAMA_BASE_URL: http://acorn-ollama:11434
      REDIS_URL: redis://acorn-redis:6379
    depends_on:
      - acorn-redis

networks:
  acorn-net:
    driver: bridge
    internal: false  # harness containers get external access blocked at Dockerfile level

volumes:
  postgres-data:
  redis-data:
  acorn-data:
  acorn-kernels:
