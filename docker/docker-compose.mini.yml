# ⚠️ DEPRECATED: Use docker/docker-compose.yml with --profile mini instead
# This file is kept for backwards compatibility only.
# Recommended: docker compose -f docker/docker-compose.yml --profile mini up -d
# Or use: bash scripts/bootstrap.sh mini

# ACORN Mac Mini M4 Pro profile
# Differences from DGX: no GPU reservations, Metal backend (Ollama auto-detects),
# STALL_DETECTION_ENABLED=true, smaller default models, lower resource caps.
version: "3.9"

include:
  - docker/docker-compose.base.yml

services:
  acorn-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Metal backend is auto-detected by Ollama on macOS — no reservations needed
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"

  acorn-api:
    environment:
      ACORN_MODE: mini
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
      DEFAULT_MODEL: llama3.2:3b
      CODER_MODEL: qwen2.5-coder:7b
      ANALYSIS_MODEL: llama3.2:3b
      MAX_AGENTS_PER_PROBLEM: "3"
      MAX_CONCURRENT_PROBLEMS: "1"
      MAX_HARNESS_CONTAINERS: "4"

  acorn-api-relay:
    environment:
      OLLAMA_BASE_URL: http://acorn-ollama:11434
      REDIS_URL: redis://acorn-redis:6379
      ROUTING_STRATEGY: stall
      STALL_DETECTION_ENABLED: "true"
      STALL_MIN_TOKENS: "15"
      LOCAL_CONFIDENCE_THRESHOLD: "0.75"

  acorn-ui:
    image: acorn/ui:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8501:8501"
    environment:
      API_BACKEND_URL: http://acorn-api:8000
      ACORN_MODE: mini
    depends_on:
      - acorn-api

volumes:
  ollama-models:
