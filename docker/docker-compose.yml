# ACORN Unified Docker Compose — single file with profiles
# Usage:
#   docker compose --profile dgx up      # DGX Spark with GPU + Ollama
#   docker compose --profile mini up     # Mac Mini M4 with Metal Ollama
#   docker compose --profile cloud up    # Cloud with vLLM backend
#
# Core services (postgres, redis) always run; all others are profile-specific.
# Each profile includes its own api, api-relay, ui, and ollama/vllm.
#
# Meta Agent Activation:
#   META_AGENT_ENABLED=true docker compose --profile dgx up acorn-api
# Or set META_AGENT_ENABLED=true in .env before running compose.

x-acorn-harness: &acorn-harness-defaults
  image: acorn/harness:latest
  restart: "no"
  networks: [acorn-net]
  environment:
    ANTHROPIC_BASE_URL: http://acorn-api-relay:9000
    ANTHROPIC_AUTH_TOKEN: ollama
    ANTHROPIC_API_KEY: ""
    CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    REDIS_URL: redis://acorn-redis:6379
    DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
  volumes:
    - acorn-data:/mnt/acorn-data:ro
    - acorn-kernels:/mnt/acorn-kernels:ro
    - ../scripts/deny-patterns.txt:/workspace/scripts/deny-patterns.txt:ro
    - ../.claude:/workspace/.claude:ro
  depends_on:
    - acorn-api-relay
    - acorn-redis
    - acorn-postgres

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Core services — always-on (no profile)
  # ──────────────────────────────────────────────────────────────────────────

  acorn-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks: [acorn-net]
    environment:
      POSTGRES_USER: acorn
      POSTGRES_PASSWORD: acorn
      POSTGRES_DB: acorn
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acorn"]
      interval: 10s
      timeout: 5s
      retries: 5

  acorn-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [acorn-net]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # DGX Spark Profile (--profile dgx)
  # ──────────────────────────────────────────────────────────────────────────

  acorn-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["dgx"]

  acorn-api:
    image: acorn/api:latest
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
      META_AGENT_ENABLED: ${META_AGENT_ENABLED:-true}
      ACORN_ROOT: ${ACORN_ROOT:?Set ACORN_ROOT in .env to the host path of the acorn repo}
      ACORN_WORKSPACE_BASE: ${ACORN_WORKSPACE_BASE:?Set ACORN_WORKSPACE_BASE in .env}
      ACORN_NETWORK: ${ACORN_NETWORK:-docker_acorn-net}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ACORN_WORKSPACE_BASE}:${ACORN_WORKSPACE_BASE}
      - ${ACORN_ROOT}:${ACORN_ROOT}:ro
    depends_on:
      acorn-postgres:
        condition: service_healthy
      acorn-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: ["dgx"]

  acorn-api-relay:
    image: acorn/api-relay:latest
    build:
      context: ../acorn_mcp/acorn-api-relay
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "9000:9000"
    environment:
      REDIS_URL: redis://acorn-redis:6379
      OLLAMA_BASE_URL: http://acorn-ollama:11434
      OLLAMA_DEFAULT_MODEL: qwen3-coder
      ROUTING_STRATEGY: passthrough
    depends_on:
      - acorn-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: ["dgx"]

  acorn-ui:
    image: acorn/ui:latest
    build:
      context: ../ui-next
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8501:3000"
    environment:
      API_BACKEND_URL: http://acorn-api:8000
    depends_on:
      - acorn-api
    profiles: ["dgx"]

  # ──────────────────────────────────────────────────────────────────────────
  # Mac Mini M4 Profile (--profile mini)
  # ──────────────────────────────────────────────────────────────────────────

  acorn-ollama-mini:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"
    profiles: ["mini"]

  acorn-api-mini:
    image: acorn/api:latest
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    networks:
      acorn-net:
        aliases: [acorn-api]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
      ACORN_MODE: mini
      DEFAULT_MODEL: llama3.2:3b
      CODER_MODEL: qwen2.5-coder:7b
      ANALYSIS_MODEL: llama3.2:3b
      MAX_AGENTS_PER_PROBLEM: "3"
      MAX_CONCURRENT_PROBLEMS: "1"
      MAX_HARNESS_CONTAINERS: "4"
      META_AGENT_ENABLED: ${META_AGENT_ENABLED:-true}
      ACORN_ROOT: ${ACORN_ROOT:?Set ACORN_ROOT in .env to the host path of the acorn repo}
      ACORN_WORKSPACE_BASE: ${ACORN_WORKSPACE_BASE:?Set ACORN_WORKSPACE_BASE in .env}
      ACORN_NETWORK: ${ACORN_NETWORK:-docker_acorn-net}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ACORN_WORKSPACE_BASE}:${ACORN_WORKSPACE_BASE}
      - ${ACORN_ROOT}:${ACORN_ROOT}:ro
    depends_on:
      acorn-postgres:
        condition: service_healthy
      acorn-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: ["mini"]

  acorn-api-relay-mini:
    image: acorn/api-relay:latest
    build:
      context: ../acorn_mcp/acorn-api-relay
    restart: unless-stopped
    networks:
      acorn-net:
        aliases: [acorn-api-relay]
    ports:
      - "9000:9000"
    environment:
      REDIS_URL: redis://acorn-redis:6379
      OLLAMA_BASE_URL: http://acorn-ollama-mini:11434
      ROUTING_STRATEGY: stall
      STALL_DETECTION_ENABLED: "true"
      STALL_MIN_TOKENS: "15"
      LOCAL_CONFIDENCE_THRESHOLD: "0.75"
    depends_on:
      - acorn-redis
    profiles: ["mini"]

  acorn-ui-mini:
    image: acorn/ui:latest
    build:
      context: ../ui-next
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8501:3000"
    environment:
      API_BACKEND_URL: http://acorn-api-mini:8000
    depends_on:
      - acorn-api-mini
    profiles: ["mini"]

  # ──────────────────────────────────────────────────────────────────────────
  # Cloud GPU Profile (--profile cloud)
  # ──────────────────────────────────────────────────────────────────────────

  acorn-vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "11434:8000"  # expose on Ollama-compatible port
    command: ["--model", "Qwen/Qwen2.5-Coder-32B-Instruct", "--served-model-name", "qwen3-coder"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["cloud"]

  acorn-api-cloud:
    image: acorn/api:latest
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    networks:
      acorn-net:
        aliases: [acorn-api]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://acorn:acorn@acorn-postgres:5432/acorn
      REDIS_URL: redis://acorn-redis:6379
      ACORN_MODE: cloud
      DEFAULT_MODEL: Qwen/Qwen2.5-Coder-32B-Instruct
      CODER_MODEL: Qwen/Qwen2.5-Coder-32B-Instruct
      ANALYSIS_MODEL: Qwen/Qwen2.5-Coder-32B-Instruct
      MAX_AGENTS_PER_PROBLEM: "5"
      MAX_CONCURRENT_PROBLEMS: "3"
      MAX_HARNESS_CONTAINERS: "15"
      CONCURRENT_PROBLEMS_ENABLED: "true"
      META_AGENT_ENABLED: ${META_AGENT_ENABLED:-true}
      ACORN_ROOT: ${ACORN_ROOT:?Set ACORN_ROOT in .env to the host path of the acorn repo}
      ACORN_WORKSPACE_BASE: ${ACORN_WORKSPACE_BASE:?Set ACORN_WORKSPACE_BASE in .env}
      ACORN_NETWORK: ${ACORN_NETWORK:-docker_acorn-net}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ACORN_WORKSPACE_BASE}:${ACORN_WORKSPACE_BASE}
      - ${ACORN_ROOT}:${ACORN_ROOT}:ro
    depends_on:
      acorn-postgres:
        condition: service_healthy
      acorn-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: ["cloud"]

  acorn-api-relay-cloud:
    image: acorn/api-relay:latest
    build:
      context: ../acorn_mcp/acorn-api-relay
    restart: unless-stopped
    networks:
      acorn-net:
        aliases: [acorn-api-relay]
    ports:
      - "9000:9000"
    environment:
      REDIS_URL: redis://acorn-redis:6379
      OLLAMA_BASE_URL: http://acorn-vllm:8000
      ROUTING_STRATEGY: passthrough
    depends_on:
      - acorn-redis
    profiles: ["cloud"]

  acorn-ui-cloud:
    image: acorn/ui:latest
    build:
      context: ../ui-next
    restart: unless-stopped
    networks: [acorn-net]
    ports:
      - "8501:3000"
    environment:
      API_BACKEND_URL: http://acorn-api-cloud:8000
    depends_on:
      - acorn-api-cloud
    profiles: ["cloud"]

  # ──────────────────────────────────────────────────────────────────────────
  # Self-build service (archived — commented out)
  # ──────────────────────────────────────────────────────────────────────────

  # acorn-builder:  # Archived
  #   image: acorn/builder:latest
  #   ...

  # ──────────────────────────────────────────────────────────────────────────
  # Self-healing warden (all profiles)
  # ──────────────────────────────────────────────────────────────────────────

  acorn-warden:
    image: acorn/warden:latest
    build:
      context: ..
      dockerfile: docker/warden/Dockerfile
    restart: unless-stopped
    networks: [acorn-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ACORN_API_URL: http://acorn-api:8000
      ACORN_WARDEN_POLL_INTERVAL: "${ACORN_WARDEN_POLL_INTERVAL:-60}"
      ACORN_MODE: ${ACORN_MODE:-dgx}
      ACORN_META_COOLDOWN: "${ACORN_META_COOLDOWN:-3600}"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    profiles: ["dgx", "mini", "cloud"]

  # ──────────────────────────────────────────────────────────────────────────
  # Harness: spawned on-demand per problem (all profiles, restart: no)
  # ──────────────────────────────────────────────────────────────────────────

  acorn-harness:
    <<: *acorn-harness-defaults
    profiles: ["dgx", "mini", "cloud"]

networks:
  acorn-net:
    driver: bridge
    internal: false  # harness containers get external access blocked at Dockerfile level

volumes:
  postgres-data:
  redis-data:
  acorn-data:
  acorn-kernels:
  ollama-models:
