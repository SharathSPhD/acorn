name: OAK CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "oak/agents", "oak/skills", "oak/ui"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy pydocstyle pydantic-settings
      - name: Ruff (lint + complexity C901)
        run: ruff check api/ memory/ oak_mcp/
      - name: Mypy strict
        run: mypy --strict api/ memory/ || true  # Phase 0: warnings only; strict in Phase 1

  pattern-check:
    name: __pattern__ enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check __pattern__ in production modules
        run: |
          python3 - <<'EOF'
          import ast, sys, pathlib
          errors = []
          for path in pathlib.Path("api").rglob("*.py"):
              if path.name == "__init__.py": continue
              if "test_" in path.name: continue
              try:
                  tree = ast.parse(path.read_text())
              except SyntaxError:
                  continue
              has_pattern = any(
                  isinstance(node, ast.Assign) and
                  any(getattr(t, "id", None) == "__pattern__" for t in node.targets)
                  for node in ast.walk(tree)
              )
              if not has_pattern:
                  errors.append(str(path))
          for path in pathlib.Path("memory").rglob("*.py"):
              if path.name == "__init__.py": continue
              try:
                  tree = ast.parse(path.read_text())
              except SyntaxError:
                  continue
              has_pattern = any(
                  isinstance(node, ast.Assign) and
                  any(getattr(t, "id", None) == "__pattern__" for t in node.targets)
                  for node in ast.walk(tree)
              )
              if not has_pattern:
                  errors.append(str(path))
          if errors:
              print("MISSING __pattern__:", errors)
              sys.exit(1)
          print("All production modules have __pattern__ declared.")
          EOF

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v --cov=api --cov=memory --cov-report=term-missing

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: oak
          POSTGRES_PASSWORD: oak
          POSTGRES_DB: oak
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - name: Apply schema
        run: psql postgresql://oak:oak@localhost:5432/oak -f api/db/schema.sql
        env:
          PGPASSWORD: oak
      - run: pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql://oak:oak@localhost:5432/oak
          REDIS_URL: redis://localhost:6379

  deny-list-contract:
    name: Deny List Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test deny patterns do not false-positive on safe commands
        run: |
          chmod +x .claude/hooks/pre-tool-use.sh
          echo '{"tool_name":"Bash","tool_input":{"command":"ls /workspace"}}' | bash .claude/hooks/pre-tool-use.sh
          echo '{"tool_name":"Bash","tool_input":{"command":"python3 app.py"}}' | bash .claude/hooks/pre-tool-use.sh
          echo '{"tool_name":"Bash","tool_input":{"command":"pytest tests/"}}' | bash .claude/hooks/pre-tool-use.sh
